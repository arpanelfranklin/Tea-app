services:
  mongo:
    image: mongo:latest
    container_name: mongo
    networks:
        - tea-app
    ports:
        - "27017:27017"
    volumes:
        - mongo-data:/data/db
    restart: always
    healthcheck:
        test: [ "CMD","mongosh","--eval","db.adminCommand('ping')" ]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 60s

  app:
    container_name: tea-app
    build:
      context: .
    restart: always
    networks:
      - tea-app
    ports:
      - "8888:8080"
    depends_on:
        mongo:
          condition: service_healthy
networks:
  tea-app:
volumes:
  mongo-data:
